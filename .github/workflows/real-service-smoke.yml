name: Manual real-service smoke

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Acknowledge that protected Clerk, Portal, and Neon test resources will be mutated
        required: true
        type: choice
        options:
          - REAL-SERVICE-SMOKE
      run_disposable_clerk_lifecycle:
        description: Create disposable identities to verify Send Home and Clerk deletion
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: portal-messenger-real-service-smoke
  cancel-in-progress: false

jobs:
  smoke:
    name: Protected Clerk, Portal, and Neon smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: real-service-smoke
    env:
      SMOKE_CONFIRMATION: REAL-SERVICE-SMOKE
      SMOKE_APP_ORIGIN: ${{ vars.SMOKE_APP_ORIGIN }}
      NEXT_PUBLIC_PORTAL_KEY: ${{ vars.NEXT_PUBLIC_PORTAL_KEY }}
      SMOKE_NEW_HIRE_A_ID: ${{ vars.SMOKE_NEW_HIRE_A_ID }}
      SMOKE_NEW_HIRE_B_ID: ${{ vars.SMOKE_NEW_HIRE_B_ID }}
      SMOKE_OPERATOR_ID: ${{ vars.SMOKE_OPERATOR_ID }}
      SMOKE_RUN_DISPOSABLE_CLERK_LIFECYCLE: ${{ inputs.run_disposable_clerk_lifecycle }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      SMOKE_CRON_SECRET: ${{ secrets.SMOKE_CRON_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - run: bun install --frozen-lockfile
      - name: Redacted credential preflight
        run: bun run smoke:real -- --preflight
      - name: Exercise deployed real services
        run: bun run smoke:real -- --artifact artifacts/real-service-smoke.json
      - name: Upload redacted smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-service-smoke-report
          path: artifacts/real-service-smoke.json
          if-no-files-found: ignore
          retention-days: 7
